name: "🚀 Alpaca Bot Execution"

on:
  schedule:
    - cron: '*/10 * * * *' # S'exécute toutes les 10 minutes
  workflow_dispatch: # Permet de le lancer à la main

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Trading Cycle
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bot_investor.py
        
      - name: Commit & Push Dashboard Data
        run: |
          git config user.name "SachaBot"
          git config user.email "bot@sacha.me"
          git add data/etat_bot.json
          git commit -m "📊 Update dashboard data" || exit 0
          git push
