<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Bordure subtile -->
  <rect width="512" height="512" rx="96" fill="none"
        stroke="#00e5ff" stroke-width="3" opacity="0.15"/>

  <!-- Courbe de marché — occupe toute la largeur, zone basse -->
  <polyline
    points="48,340 110,290 175,310 235,240 295,255 360,185 420,200 464,152"
    fill="none" stroke="url(#lineGrad)" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Zone sous la courbe (fill dégradé) -->
  <polygon
    points="48,340 110,290 175,310 235,240 295,255 360,185 420,200 464,152 464,380 48,380"
    fill="url(#lineGrad)" opacity="0.07"/>

  <!-- Point final brillant -->
  <circle cx="464" cy="152" r="18" fill="#00ff88" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="464" cy="152" r="9"  fill="#ffffff"/>

  <!-- Lettre R — grande, bold, centrée haut -->
  <text x="136" y="175"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="195" font-weight="900"
        fill="#00e5ff" filter="url(#glow)" opacity="0.95"
        letter-spacing="-6">R</text>

  <!-- Chiffre 4 à droite du R -->
  <text x="298" y="175"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="195" font-weight="900"
        fill="#00ff88" filter="url(#glow)" opacity="0.95">4</text>

  <!-- Ligne séparatrice fine -->
  <line x1="64" y1="395" x2="448" y2="395"
        stroke="#00e5ff" stroke-width="2" opacity="0.2"/>

  <!-- Sous-texte TRADING BOT -->
  <text x="256" y="460"
        text-anchor="middle"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="36" font-weight="700"
        fill="#00e5ff" opacity="0.55"
        letter-spacing="10">TRADING BOT</text>
</svg>
