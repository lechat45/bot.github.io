<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glow cyan (tête) -->
    <filter id="gc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow purple (corps) -->
    <filter id="gp" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow orange (jambes) -->
    <filter id="go" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow pink (icônes corps) -->
    <filter id="gk" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient jambes orange→jaune→transparent -->
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff9500" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#ffcc00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffee44" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Fond radial sombre -->
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%"   stop-color="#1e2244"/>
      <stop offset="100%" stop-color="#0b0c18"/>
    </radialGradient>
  </defs>

  <!-- ── Fond ── -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- ── Décos : petits diamants éparpillés ── -->
  <!-- Cyan gauche haut -->
  <rect x="62" y="178" width="13" height="13" rx="2"
        transform="rotate(45,68.5,184.5)"
        fill="none" stroke="#00fff2" stroke-width="2" opacity="0.75" filter="url(#gc)"/>
  <!-- Purple droite haut -->
  <rect x="422" y="152" width="11" height="11" rx="1"
        transform="rotate(45,427.5,157.5)"
        fill="none" stroke="#c46dff" stroke-width="2" opacity="0.7" filter="url(#gp)"/>
  <!-- Orange droite milieu -->
  <rect x="412" y="305" width="12" height="12"
        transform="rotate(45,418,311)"
        fill="#ff9500" opacity="0.55" filter="url(#go)"/>
  <!-- Cyan gauche bas -->
  <rect x="72" y="318" width="9" height="9"
        transform="rotate(45,76.5,322.5)"
        fill="none" stroke="#00fff2" stroke-width="1.5" opacity="0.55"/>
  <!-- Cyan droite haut 2 -->
  <rect x="375" y="193" width="9" height="9"
        transform="rotate(45,379.5,197.5)"
        fill="#00fff2" opacity="0.4"/>
  <!-- Purple bas gauche -->
  <rect x="108" y="392" width="9" height="9"
        transform="rotate(45,112.5,396.5)"
        fill="none" stroke="#c46dff" stroke-width="1.5" opacity="0.5"/>

  <!-- ══════════════════════════════════════════════
       ANTENNE
  ══════════════════════════════════════════════ -->
  <!-- Tige verticale -->
  <line x1="256" y1="163" x2="256" y2="102"
        stroke="#00fff2" stroke-width="6" stroke-linecap="round" filter="url(#gc)"/>
  <!-- Barre horizontale -->
  <line x1="222" y1="126" x2="290" y2="126"
        stroke="#00fff2" stroke-width="6" stroke-linecap="round" filter="url(#gc)"/>
  <!-- Cercle du haut -->
  <circle cx="256" cy="80" r="24"
          fill="none" stroke="#00fff2" stroke-width="6" filter="url(#gc)"/>

  <!-- ══════════════════════════════════════════════
       TÊTE (rectangle cyan arrondi)
  ══════════════════════════════════════════════ -->
  <!-- Fond sombre de la tête -->
  <rect x="108" y="163" width="296" height="172" rx="44"
        fill="#080e1e"/>
  <!-- Contour néon cyan -->
  <rect x="108" y="163" width="296" height="172" rx="44"
        fill="none" stroke="#00fff2" stroke-width="7" filter="url(#gc)"/>

  <!-- Yeux (petits rectangles verticaux cyan) -->
  <rect x="173" y="215" width="34" height="66" rx="11"
        fill="#00fff2" filter="url(#gc)" opacity="0.95"/>
  <rect x="305" y="215" width="34" height="66" rx="11"
        fill="#00fff2" filter="url(#gc)" opacity="0.95"/>

  <!-- ══════════════════════════════════════════════
       CORPS (rectangle purple arrondi)
  ══════════════════════════════════════════════ -->
  <!-- Fond sombre du corps -->
  <rect x="148" y="354" width="216" height="102" rx="28"
        fill="#080e1e"/>
  <!-- Contour néon purple -->
  <rect x="148" y="354" width="216" height="102" rx="28"
        fill="none" stroke="#c46dff" stroke-width="7" filter="url(#gp)"/>

  <!-- Flèche ↗ (montante) en rose/magenta -->
  <!-- Ligne diagonale de la flèche -->
  <line x1="186" y1="440" x2="228" y2="376"
        stroke="#ff2d78" stroke-width="7" stroke-linecap="round" filter="url(#gk)"/>
  <!-- Pointe de la flèche (arrowhead) -->
  <polyline points="200,374 228,374 228,400"
            fill="none" stroke="#ff2d78" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#gk)"/>

  <!-- Signe $ (dollar) en rose -->
  <text x="302" y="438"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="66" font-weight="900"
        fill="#ff2d78" filter="url(#gk)"
        text-anchor="middle">$</text>

  <!-- ══════════════════════════════════════════════
       JAMBES / PROPULSEURS (lignes orange)
  ══════════════════════════════════════════════ -->
  <line x1="188" y1="457" x2="188" y2="496"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="212" y1="457" x2="212" y2="510"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="236" y1="457" x2="236" y2="504"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="256" y1="457" x2="256" y2="512"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="276" y1="457" x2="276" y2="504"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="300" y1="457" x2="300" y2="510"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
  <line x1="324" y1="457" x2="324" y2="496"
        stroke="url(#lg)" stroke-width="9" stroke-linecap="round" filter="url(#go)"/>
</svg>
