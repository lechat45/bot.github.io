<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sacha Investor Bot — Alpaca</title>
    <style>
        :root { --bg: #0a0a0b; --surface: #161618; --accent: #3b82f6; --text: #e4e4e7; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid #27272a; }
        .status { color: #10b981; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #27272a; }
        .log-entry { font-family: monospace; font-size: 0.9em; margin-bottom: 5px; color: #a1a1aa; }
    </style>
</head>
<body>
    <h1>🤖 Bot d'Investissement <span class="status">● ALPACA LIVE</span></h1>
    
    <div class="grid">
        <div class="card">
            <h3>Portefeuille</h3>
            <div id="valeur" style="font-size: 2em; font-weight: bold;">-- $</div>
            <div id="pnl">--</div>
        </div>
        <div class="card">
            <h3>Capital Cash</h3>
            <div id="cash" style="font-size: 1.5em;">-- $</div>
        </div>
    </div>

    <div class="grid" style="margin-top: 20px;">
        <div class="card" style="grid-column: span 2;">
            <h3>Positions Actuelles</h3>
            <table id="table-positions">
                <thead><tr><th>Actif</th><th>Qté</th><th>Prix Moyen</th><th>P&L %</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Journal d'Alpaca</h3>
            <div id="journal"></div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const response = await fetch('data/etat_bot.json');
                const data = await response.json();
                
                document.getElementById('valeur').innerText = data.portefeuille.valeur_totale.toLocaleString() + ' $';
                document.getElementById('cash').innerText = data.portefeuille.capital_disponible.toLocaleString() + ' $';
                
                const pnl = data.portefeuille.pnl_total;
                document.getElementById('pnl').innerText = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + ' $';
                document.getElementById('pnl').style.color = pnl >= 0 ? '#10b981' : '#ef4444';

                const tbody = document.querySelector('#table-positions tbody');
                tbody.innerHTML = data.portefeuille.positions.map(p => `
                    <tr>
                        <td><b>${p.ticker}</b></td>
                        <td>${p.quantite}</td>
                        <td>${p.prix_achat.toFixed(2)}$</td>
                        <td style="color: ${p.pnl_pct >= 0 ? '#10b981' : '#ef4444'}">${p.pnl_pct.toFixed(2)}%</td>
                    </tr>
                `).join('');

                const journal = document.getElementById('journal');
                journal.innerHTML = data.analyses.map(log => `
                    <div class="log-entry">[${log.heure}] ${log.message}</div>
                `).reverse().join('');

            } catch (e) { console.error("Erreur de chargement", e); }
        }
        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
