<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacha Investor Dashboard — v2.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a0a0b; --surface: #161618; --accent: #3b82f6; --text: #e4e4e7; --success: #10b981; --error: #ef4444; --border: #27272a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .big-number { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.8em; font-weight: bold; }
        .badge-live { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge-test { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid #f59e0b; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #71717a; font-size: 0.8em; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        #journal { height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.85em; }
        .log-line { margin-bottom: 6px; padding-left: 10px; border-left: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0">Sacha Investor <span style="color:var(--accent)">Bot</span></h1>
            <div style="font-size: 0.8em; color:#71717a; margin-top:5px;" id="last-update">MAJ: --</div>
        </div>
        <div id="mode-badge" class="badge">INITIALISATION...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Solde Total</h3>
            <div id="valeur" class="big-number">-- $</div>
            <div id="pnl" style="font-weight: bold;">--</div>
        </div>
        <div class="card">
            <h3>Performance</h3>
            <canvas id="perfChart" height="100"></canvas>
        </div>
    </div>

    <div class="grid" style="margin-top:20px; grid-template-columns: 2fr 1fr;">
        <div class="card">
            <h3>Positions Actives</h3>
            <table>
                <thead><tr><th>ACTIF</th><th>QTÉ</th><th>ACHAT</th><th>P&L %</th></tr></thead>
                <tbody id="pos-table"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Journal IA (Groq)</h3>
            <div id="journal"></div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    async function refresh() {
        try {
            const res = await fetch('./data/etat_bot.json?t=' + Date.now());
            const data = await res.json();

            // Meta
            document.getElementById('last-update').innerText = "DERNIÈRE ACTION: " + data.meta.derniere_maj;
            const badge = document.getElementById('mode-badge');
            badge.innerText = data.meta.mode;
            badge.className = "badge " + (data.meta.mode.includes("LIVE") ? "badge-live" : "badge-test");

            // Portefeuille
            const pf = data.portefeuille;
            document.getElementById('valeur').innerText = pf.valeur_totale.toLocaleString() + " $";
            const pnlEl = document.getElementById('pnl');
            pnlEl.innerText = (pf.pnl_total >= 0 ? "+" : "") + pf.pnl_total.toFixed(2) + " $";
            pnlEl.style.color = pf.pnl_total >= 0 ? "var(--success)" : "var(--error)";

            // Tableau
            document.getElementById('pos-table').innerHTML = pf.positions.length ? pf.positions.map(p => `
                <tr>
                    <td style="font-weight:bold">${p.ticker}</td>
                    <td>${p.quantite.toFixed(3)}</td>
                    <td>${p.prix_achat.toFixed(2)}$</td>
                    <td style="color:${p.pnl_pct >= 0 ? 'var(--success)' : 'var(--error)'}; font-weight:bold">
                        ${p.pnl_pct >= 0 ? '+' : ''}${p.pnl_pct.toFixed(2)}%
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="4" style="text-align:center; padding:20px; color:#71717a">Aucune position</td></tr>';

            // Logs
            document.getElementById('journal').innerHTML = data.analyses.map(l => `
                <div class="log-line"><span style="color:var(--accent)">${l.heure}</span> ${l.message}</div>
            `).reverse().join('');

            // Graphique
            const ctx = document.getElementById('perfChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.historique.map(h => h.date),
                    datasets: [{
                        data: data.historique.map(h => h.valeur),
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });

        } catch (e) { console.log("Maj en attente..."); }
    }

    setInterval(refresh, 30000);
    refresh();
</script>
</body>
</html>
